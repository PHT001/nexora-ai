<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sondage — Seora</title>
  <link rel="stylesheet" href="css/landing.css">
  <style>
    .survey-topbar {
      padding: 20px 32px;
      display: flex;
      align-items: center;
    }

    .survey-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      font-weight: 600;
      color: var(--accent);
      margin-bottom: 16px;
    }
    .survey-badge-icon {
      width: 24px;
      height: 24px;
      background: var(--accent);
      border-radius: 4px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .survey-question {
      font-size: 28px;
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: 8px;
      line-height: 1.3;
    }

    .survey-desc {
      font-size: 15px;
      color: #888;
      margin-bottom: 32px;
      line-height: 1.5;
    }

    .survey-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .survey-option {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 20px;
      border: 1.5px solid #e5e7eb;
      border-radius: 12px;
      background: #fff;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 15px;
      font-weight: 500;
      color: #333;
      font-family: 'Inter', sans-serif;
    }
    .survey-option:hover {
      border-color: var(--accent);
      background: #f5f4ff;
    }
    .survey-option.selected {
      border-color: var(--accent);
      background: #f0efff;
      color: var(--accent);
      font-weight: 600;
    }
    .survey-option-icon {
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .survey-option-icon img,
    .survey-option-icon svg {
      width: 20px;
      height: 20px;
    }

    .survey-submit {
      width: 100%;
      padding: 16px;
      margin-top: 28px;
      background: linear-gradient(135deg, #5855FF, #8B3DFF);
      color: #fff;
      border: none;
      border-radius: 9999px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: opacity 0.2s;
    }
    .survey-submit:hover { opacity: 0.9; }
    .survey-submit:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .survey-skip {
      display: block;
      width: 100%;
      padding: 12px;
      margin-top: 8px;
      background: none;
      border: none;
      color: #999;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      text-align: center;
      font-family: 'Inter', sans-serif;
      transition: color 0.2s;
    }
    .survey-skip:hover { color: #555; }

    /* Right side big logo */
    .survey-right-logo {
      position: relative;
      z-index: 1;
      width: 180px;
      height: 180px;
      background: #5855FF;
      border-radius: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 12px 40px rgba(0,0,0,0.15);
    }
    .survey-right-logo svg {
      width: 120px;
      height: 120px;
    }

    /* Dot pattern for right side */
    .dots-bg {
      position: absolute;
      inset: 0;
      overflow: hidden;
    }
    .dots-bg svg { width: 100%; height: 100%; }

    @keyframes surveyIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .survey-content { animation: surveyIn 0.4s ease; }

    @media (max-width: 768px) {
      .survey-topbar { padding: 16px 20px; }
      .survey-question { font-size: 22px; }
      .survey-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <!-- Top bar -->
  <div class="survey-topbar">
    <a href="index.html" class="s-nav-logo">
      <svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="28" height="28" rx="8" fill="#5855FF"/>
        <path d="M18 9.5C17 8 15 7.5 13.5 7.5C11 7.5 9 8.8 9 10.8C9 13 11 13.8 14 14.8C17 15.8 19 16.8 19 18.8C19 20.8 17 21.5 14.5 21.5C13 21.5 11 21 10 19.5" stroke="#fff" stroke-width="2.5" stroke-linecap="round" fill="none"/>
      </svg>
      Seora
    </a>
  </div>

  <!-- Main Layout -->
  <div class="auth-page" style="display:none;">

    <!-- Left: Survey -->
    <div class="auth-left survey-content" style="max-width:520px;">

      <div class="survey-badge">
        <span class="survey-badge-icon">
          <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg" width="14" height="14">
            <rect x="2" y="2" width="12" height="12" rx="2" stroke="#fff" stroke-width="1.5" fill="none"/>
            <path d="M5 8l2 2 4-4" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </span>
        Sondage
      </div>

      <h1 class="survey-question" style="font-family:'Cal Sans',system-ui,sans-serif;font-weight:400;">Comment avez-vous connu Seora ?</h1>
      <p class="survey-desc">Votre reponse nous aide a ameliorer nos strategies marketing et votre experience.</p>

      <div class="survey-grid">
        <button class="survey-option" data-value="facebook" onclick="selectSource(this)">
          <span class="survey-option-icon">
            <svg viewBox="0 0 24 24" fill="#1877F2"><path d="M24 12.073c0-6.627-5.373-12-12-12S0 5.446 0 12.073c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.668 4.533-4.668 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.875v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
          </span>
          Facebook
        </button>
        <button class="survey-option" data-value="instagram" onclick="selectSource(this)">
          <span class="survey-option-icon">
            <svg viewBox="0 0 24 24" fill="none"><defs><linearGradient id="ig" x1="0" y1="24" x2="24" y2="0"><stop offset="0%" stop-color="#FFDC80"/><stop offset="25%" stop-color="#F77737"/><stop offset="50%" stop-color="#E1306C"/><stop offset="75%" stop-color="#C13584"/><stop offset="100%" stop-color="#833AB4"/></linearGradient></defs><rect x="2" y="2" width="20" height="20" rx="6" stroke="url(#ig)" stroke-width="2"/><circle cx="12" cy="12" r="5" stroke="url(#ig)" stroke-width="2"/><circle cx="18" cy="6" r="1.5" fill="url(#ig)"/></svg>
          </span>
          Instagram
        </button>
        <button class="survey-option" data-value="google" onclick="selectSource(this)">
          <span class="survey-option-icon">
            <svg viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18A10.96 10.96 0 001 12c0 1.77.42 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
          </span>
          Google
        </button>
        <button class="survey-option" data-value="email" onclick="selectSource(this)">
          <span class="survey-option-icon">
            <svg viewBox="0 0 24 24" fill="none"><rect x="2" y="4" width="20" height="16" rx="3" stroke="#666" stroke-width="2"/><path d="M2 7l10 6 10-6" stroke="#666" stroke-width="2" stroke-linecap="round"/></svg>
          </span>
          Email
        </button>
        <button class="survey-option" data-value="reddit" onclick="selectSource(this)">
          <span class="survey-option-icon">
            <svg viewBox="0 0 24 24" fill="#FF4500"><circle cx="12" cy="12" r="12"/><path d="M19.6 12.4a1.8 1.8 0 00-3-.8c-1.2-.8-2.8-1.3-4.5-1.4l.8-3.7 2.6.6a1.3 1.3 0 102.5 0 1.3 1.3 0 00-2.5-.3l-2.9-.6a.4.4 0 00-.5.3l-.9 4.1c-1.7.1-3.4.6-4.6 1.4a1.8 1.8 0 10-2 2.9 3.3 3.3 0 000 .6c0 2.7 3.2 4.9 7 4.9s7-2.2 7-4.9a3.3 3.3 0 000-.6 1.8 1.8 0 001-1.5z" fill="#FF4500"/><circle cx="9" cy="13.5" r="1.5" fill="#fff"/><circle cx="15" cy="13.5" r="1.5" fill="#fff"/><path d="M9.5 16.5c.8.8 2 1 2.5 1s1.7-.2 2.5-1" stroke="#fff" stroke-width="1" stroke-linecap="round" fill="none"/></svg>
          </span>
          Reddit
        </button>
        <button class="survey-option" data-value="friend" onclick="selectSource(this)">
          <span class="survey-option-icon">
            <svg viewBox="0 0 24 24" fill="none"><circle cx="9" cy="7" r="4" stroke="#3B82F6" stroke-width="2"/><path d="M2 21v-2a4 4 0 014-4h6a4 4 0 014 4v2" stroke="#3B82F6" stroke-width="2" stroke-linecap="round"/><path d="M16 3.13a4 4 0 010 7.75M21 21v-2a4 4 0 00-3-3.87" stroke="#3B82F6" stroke-width="2" stroke-linecap="round"/></svg>
          </span>
          Ami / Collegue
        </button>
        <button class="survey-option" data-value="linkedin" onclick="selectSource(this)">
          <span class="survey-option-icon">
            <svg viewBox="0 0 24 24" fill="#0A66C2"><path d="M20.5 2h-17A1.5 1.5 0 002 3.5v17A1.5 1.5 0 003.5 22h17a1.5 1.5 0 001.5-1.5v-17A1.5 1.5 0 0020.5 2zM8 19H5v-9h3zM6.5 8.25A1.75 1.75 0 118.3 6.5a1.78 1.78 0 01-1.8 1.75zM19 19h-3v-4.74c0-1.42-.6-1.93-1.38-1.93A1.74 1.74 0 0013 14.19V19h-3v-9h2.9v1.3a3.11 3.11 0 012.7-1.4c1.55 0 3.36.86 3.36 3.66z"/></svg>
          </span>
          LinkedIn
        </button>
        <button class="survey-option" data-value="other" onclick="selectSource(this)">
          <span class="survey-option-icon">
            <svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="#999" stroke-width="2"/><circle cx="12" cy="16" r="1" fill="#999"/><path d="M12 8v5" stroke="#999" stroke-width="2" stroke-linecap="round"/></svg>
          </span>
          Autre
        </button>
      </div>

      <button class="survey-submit" id="survey-btn" onclick="submitSurvey()" disabled>Continuer &rarr;</button>
      <button class="survey-skip" onclick="skipSurvey()">Passer cette etape</button>

    </div>

    <!-- Right: Decorative -->
    <div class="auth-right">
      <div class="dots-bg">
        <svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%">
          <defs>
            <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
              <circle cx="20" cy="20" r="4" fill="#e0e0e0"/>
            </pattern>
          </defs>
          <rect width="100%" height="100%" fill="url(#dots)"/>
        </svg>
      </div>
      <div class="survey-right-logo">
        <svg viewBox="0 0 28 28" width="120" height="120" fill="none">
          <path d="M18 9.5C17 8 15 7.5 13.5 7.5C11 7.5 9 8.8 9 10.8C9 13 11 13.8 14 14.8C17 15.8 19 16.8 19 18.8C19 20.8 17 21.5 14.5 21.5C13 21.5 11 21 10 19.5" stroke="#fff" stroke-width="2.5" stroke-linecap="round" fill="none"/>
        </svg>
      </div>
    </div>

  </div>

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="js/auth.js"></script>
  <script>
    // --- Auth Guard ---
    requireAuth().then(function(user) {
      if (!user) return;
      document.querySelector('.auth-page').style.display = 'flex';
    });

    var selectedSource = '';

    function selectSource(btn) {
      document.querySelectorAll('.survey-option').forEach(function(o) { o.classList.remove('selected'); });
      btn.classList.add('selected');
      selectedSource = btn.getAttribute('data-value');
      document.getElementById('survey-btn').disabled = false;
    }

    function submitSurvey() {
      if (!selectedSource) return;
      localStorage.setItem('seora_acquisition_source', selectedSource);
      window.location.href = 'pricing.html';
    }

    function skipSurvey() {
      window.location.href = 'pricing.html';
    }
  </script>
</body>
</html>
